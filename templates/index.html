<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Car Price Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-lg p-5">

                <h1 class="text-center text-primary mb-3">
                    🚗 Car Price Prediction System
                </h1>

                <p class="text-center text-muted">
                    Predict Used Car Price using Machine Learning
                </p>

                <hr>

                <form action="/predict" method="POST">

                    <!-- Company -->

                    <div class="mb-3">

                        <label class="form-label">

                            🚗 Company

                        </label>

                        <select
                            class="form-select"
                            id="company"
                            name="company"
                            onchange="updateModels()"
                            required>

                            <option value="">Select Company</option>

                            {% for company in companies %}

                            <option value="{{ company }}">

                                {{ company }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- Model -->

                    <div class="mb-3">

                        <label class="form-label">

                            🚙 Car Model

                        </label>

                        <select
                            class="form-select"
                            id="car_model"
                            name="car_model"
                            required>

                            <option value="">

                                Select Car Model

                            </option>

                        </select>

                    </div>

                    <!-- Year -->

                    <div class="mb-3">

                        <label class="form-label">

                            📅 Manufacturing Year

                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="year"
                            placeholder="Enter Year"
                            required>

                    </div>

                    <!-- Fuel -->

                    <div class="mb-3">

                        <label class="form-label">

                            ⛽ Fuel Type

                        </label>

                        <select
                            class="form-select"
                            name="fuel_type"
                            required>

                            <option value="">Select Fuel Type</option>

                            {% for fuel in fuel_types %}

                            <option value="{{ fuel }}">

                                {{ fuel }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- KM -->

                    <div class="mb-4">

                        <label class="form-label">

                            🛣️ Kilometers Driven

                        </label>

                        <input
                            type="number"
                            class="form-control"
                            name="kms_driven"
                            placeholder="Enter Kilometers"
                            required>

                    </div>

                    <button
                        class="btn btn-primary w-100"
                        type="submit"
                        id="predictBtn">

                         Predict Price

                    </button>

                </form>

                {% if prediction %}

                <div class="result-card mt-4">

                    <h4>

                        Estimated Car Price

                    </h4>

                    <h1>

                        ₹ {{ prediction }}

                    </h1>

                </div>

                {% endif %}

            </div>

        </div>

    </div>

</div>

<footer>

    Developed by <b>Akshay</b> |
    InternPE AI/ML Internship

</footer>

<script>

const companyModels = {{ company_models | tojson }};

function updateModels(){

    let company=document.getElementById("company").value;

    let model=document.getElementById("car_model");

    model.innerHTML="<option value=''>Select Car Model</option>";

    if(companyModels[company]){

        companyModels[company].forEach(function(car){

            let option=document.createElement("option");

            option.value=car;

            option.text=car;

            model.appendChild(option);

        });

    }

}

document.querySelector("form").addEventListener("submit",function(){

    document.getElementById("predictBtn").innerHTML="Predicting...";

});

</script>

</body>

</html>
